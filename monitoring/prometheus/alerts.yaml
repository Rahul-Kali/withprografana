groups:
  - name: microservices
    rules:
      - alert: ServiceDown
        expr: up{job=~"spring-services|flask-services"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "{{ $labels.instance }} is down"
          description: "Prometheus has not been able to scrape {{ $labels.instance }} for more than 1 minute."

      - alert: HighHttpServerErrorRate
        expr: |
          sum by (application) (rate(http_server_requests_seconds_count{status=~"5.."}[5m]))
          /
          sum by (application) (rate(http_server_requests_seconds_count[5m]))
          > 0.05
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "{{ $labels.application }} has high 5xx errors"
          description: "More than 5% of HTTP requests have returned 5xx responses over the last 5 minutes."

      - alert: OrderFailuresDetected
        expr: increase(orders_total{result="failure"}[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Order failures detected"
          description: "At least one order failed in the last 5 minutes."

      - alert: FallbackCallsDetected
        expr: increase(downstream_service_calls_total{source="fallback"}[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Order service used a fallback URL"
          description: "The order-service used fallback calls for {{ $labels.service }} in the last 5 minutes."
