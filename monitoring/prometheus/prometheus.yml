global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: spring-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - user-service:8081
          - product-service:8082
          - order-service:8083

  - job_name: flask-services
    metrics_path: /metrics
    static_configs:
      - targets:
          - payment-service:5001
          - notification-service:5002
          - analytics-service:5003
