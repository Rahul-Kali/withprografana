apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    rule_files:
      - /etc/prometheus/alerts.yml

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager:9093

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets:
              - localhost:9090

      - job_name: spring-services
        metrics_path: /actuator/prometheus
        static_configs:
          - targets:
              - user-service:8081
              - product-service:8082
              - order-service:8083

      - job_name: flask-services
        metrics_path: /metrics
        static_configs:
          - targets:
              - payment-service:5001
              - notification-service:5002
              - analytics-service:5003
  alerts.yml: |
    groups:
      - name: microservices
        rules:
          - alert: ServiceDown
            expr: up{job=~"spring-services|flask-services"} == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "{{ $labels.instance }} is down"
              description: "Prometheus has not been able to scrape {{ $labels.instance }} for more than 1 minute."
          - alert: OrderFailuresDetected
            expr: increase(orders_total{result="failure"}[5m]) > 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Order failures detected"
              description: "At least one order failed in the last 5 minutes."
          - alert: FallbackCallsDetected
            expr: increase(downstream_service_calls_total{source="fallback"}[5m]) > 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Order service used a fallback URL"
              description: "The order-service used fallback calls for {{ $labels.service }} in the last 5 minutes."
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
data:
  alertmanager.yml: |
    global:
      smtp_smarthost: "smtp.gmail.com:587"
      smtp_from: "your-email@gmail.com"
      smtp_auth_username: "your-email@gmail.com"
      smtp_auth_password: "your-app-password"
      smtp_require_tls: true

    route:
      receiver: email-alerts
      group_by:
        - alertname
        - instance
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h

    receivers:
      - name: email-alerts
        email_configs:
          - to: "receiver-email@example.com"
            send_resolved: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-provisioning
data:
  datasource.yml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        uid: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        editable: true
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
          ports:
            - containerPort: 9093
          volumeMounts:
            - name: alertmanager-config
              mountPath: /etc/alertmanager
      volumes:
        - name: alertmanager-config
          configMap:
            name: alertmanager-config
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.1
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: prometheus-config
              mountPath: /etc/prometheus
      volumes:
        - name: prometheus-config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.4
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: grafana-provisioning
              mountPath: /etc/grafana/provisioning/datasources
      volumes:
        - name: grafana-provisioning
          configMap:
            name: grafana-provisioning
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 32001
